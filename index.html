<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interférences</title>
  <link rel="stylesheet" href="interferences.css?v=2.3">
</head>

<footer>
  <p>© Asven Gariah • 2026</p>
</footer>

<body>

  <header>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 115"
         width="100%" role="img" aria-label="Interférences">
      <text y="97"
            style="font-family:'Syne',sans-serif;font-weight:800;font-size:108px;letter-spacing:-0.04em;fill:#1e1c18;">
        Interférences
      </text>
    </svg>
    <p class="subtitle">JE TRAVERSE LE SON</p>
  </header>

  <section class="site-section" id="journal">
    <div class="section-content" id="journal-list">
      
      <article class="journal-entry">
        <div class="entry-toggle" data-src="journal/2026-04-05-ce-qui-reste-du-bruit-1997-2026.html">
          <span class="entry-date">5 avril 2026</span>
          <div class="entry-toggle-grid">
            <span class="entry-title">Ce qui reste du bruit. 1997–2026.</span>
            <span class="toggle-hint">ouvrir</span>
          </div>
        </div>
        <div class="entry-content"></div>
      </article>

      <article class="journal-entry">
        <div class="entry-toggle" data-src="journal/2026-04-05-ce-qui-reste-du-bruit-1997-2026.html">
          <span class="entry-date">5 avril 2026</span>
          <div class="entry-toggle-grid">
            <span class="entry-title">TEST TEST.</span>
            <span class="toggle-hint">ouvrir</span>
          </div>
        </div>
        <div class="entry-content"></div>
      </article>

    </div>
  </section>

  <script>
    // Gestion dynamique du Journal
    document.querySelectorAll('.entry-toggle').forEach(toggle => {
      const container = toggle.closest('.journal-entry');
      const content = container.querySelector('.entry-content');
      const hint = toggle.querySelector('.toggle-hint');
      const src = toggle.dataset.src;

      hint.textContent = 'ouvrir →';

      toggle.addEventListener('click', () => {
        const isOpen = content.classList.contains('open');

        if (isOpen) {
          content.classList.remove('open');
          toggle.classList.remove('open');
          hint.textContent = 'ouvrir →';
          return;
        }

        content.classList.add('open');
        toggle.classList.add('open');
        hint.textContent = 'réduire ↓';

        if (content._loaded) return;
        content._loaded = true;
        content.innerHTML = '<p class="loading">chargement…</p>';

        fetch(src)
          .then(r => r.text())
          .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const main = doc.querySelector('main');
            if (main) {
              content.innerHTML = main.innerHTML;
            }
          })
          .catch(() => {
            content.innerHTML = '<p class="observation-plain">— Erreur de chargement.</p>';
          });
      });
    });    
  </script>

</body>
</html>
